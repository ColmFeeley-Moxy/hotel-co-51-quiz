<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Co 51 Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=9" />
</head>

<body>
  <canvas id="auroraCanvas"></canvas>

  <main class="container">
    <div class="header-block">
      <img
        class="logo"
        src="https://hotelco51.com/wp-content/uploads/2024/08/cropped-Hotel_Co_51.png"
        alt="Hotel Co 51"
      />
      <p class="subtitle">Knowledge Challenge</p>
      <h1 class="title">Let's Get Quizzical</h1>
    </div>

    <!-- LOGIN -->
    <section id="login" class="card">
      <p class="card-intro">Enter your details below to begin the quiz.</p>
      <form id="loginForm" autocomplete="on" novalidate>
        <div class="field-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" placeholder="e.g. Jane Smith" autocomplete="name" required />
          <span class="field-error" id="nameError"></span>
        </div>
        <div class="field-group">
          <label for="email">Work Email</label>
          <input id="email" type="email" placeholder="you@company.com" autocomplete="email" required />
          <span class="field-error" id="emailError"></span>
        </div>
        <div id="loginError" class="login-error" aria-live="polite"></div>
        <button type="submit" class="startBtn">
          <span>Start Quiz</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="card hidden">
      <div class="progress-block">
        <div class="progress-top">
          <div id="welcome" class="welcome-text"></div>
          <div id="score" class="score-badge">Score: 0</div>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div id="progress" class="progress-label">Question 1 of 10</div>
      </div>
      <div id="questionWrap" class="question-wrap">
        <div id="question" class="question-text"></div>
        <div id="choices" class="choices-grid"></div>
        <div id="feedback" class="feedback-text" aria-live="polite"></div>
      </div>
      <button id="nextBtn" class="startBtn" type="button" disabled>
        <span id="nextLabel">Next Question</span>
        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </section>

    <!-- RESULTS -->
    <section id="results" class="card hidden results-card">
      <div class="results-icon" id="resultsIcon">🎉</div>
      <h2 class="results-title" id="resultsTitle">Quiz Complete!</h2>
      <p class="results-subtitle" id="resultsSubtitle"></p>
      <div class="results-score-block">
        <span class="results-score-num" id="resultsScoreNum">0</span>
        <span class="results-score-denom" id="resultsScoreDenom">/10</span>
      </div>
      <p class="results-msg" id="resultsMsg"></p>
      <div id="saveStatus" class="save-status" aria-live="polite"></div>
      <button class="startBtn" id="learnMoreBtn" style="display:none;">
        <span>Visit Hotel Co 51</span>
        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </section>
  </main>

  <script src="app.js?v=9"></script>
</body>
</html>
